# =====================================================
# Netlify Configuration — Проект «Счастье видеть»
# Домен: landing.schastie-videt.uz
# =====================================================

[build]
  publish = "."
  command = ""

# ── Security headers ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets 1 year ────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Netlify Forms — email notifications ───────────
# After deploying, go to:
#   Netlify Dashboard → Site → Forms → Notifications
#   → New notification → Email notification
#   Recipient: nergiza@schastie-videt.uz
#
# Two forms are auto-detected from the HTML:
#   - "appointment"  (Запись на приём)
#   - "feedback"     (Обратная связь → Нергиза)
#
# Spam protection: honeypot field "bot-field" is
# already configured in the HTML forms.
